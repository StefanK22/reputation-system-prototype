services:
  database:
    image: postgres:17.6
    container_name: reputation-db
    environment:
      POSTGRES_DB: reputation
      POSTGRES_USER: reputation
      POSTGRES_PASSWORD: reputation_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reputation -d reputation"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reputation-network

  canton-sandbox:
    build:
      context: ./canton
      dockerfile: Dockerfile
    container_name: canton-sandbox
    ports:
      - "6865:6865"
      - "7575:7575"
    networks:
      - reputation-network


  reputation-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reputation-engine
    command: ["npm", "run", "start:engine"]
    environment:
      CANTON_API_URL: http://canton-sandbox:7575
      DATABASE_URL: postgresql://reputation:reputation_password@database:5432/reputation
      CANTON_PARTY: Operator
      CANTON_USER_ID: operator-user
    depends_on:
      database:
        condition: service_healthy
    restart: on-failure
    networks:
      - reputation-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reputation-api
    command: ["npm", "run", "start:api"]
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://reputation:reputation_password@database:5432/reputation
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - reputation-network

  console:
    build:
      context: ./src/modules/console
      dockerfile: Dockerfile
    container_name: reputation-console
    environment:
      API_URL: http://api:8080
      CANTON_API_URL: http://canton-sandbox:7575
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    networks:
      - reputation-network

volumes:
  postgres_data:
    driver: local

networks:
  reputation-network:
    driver: bridge
